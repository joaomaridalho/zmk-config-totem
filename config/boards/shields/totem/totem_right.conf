# Debounce: 5ms press (sweet spot — low latency without ghost presses)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Lock BLE connection interval to minimum 7.5ms (6 × 1.25ms)
# Default allows up to 15ms, which adds variable latency on every keypress
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6

# No slave latency — peripheral must respond on every connection event
# A value >0 allows skipping events, adding latency
CONFIG_BT_PERIPHERAL_PREF_SLAVE_LATENCY=0

# Supervision timeout (400 × 10ms = 4s) — stable without being too slow to detect drops
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# Boost TX power for stable link at minimum connection interval
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
